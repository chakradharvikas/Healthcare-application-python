trigger:
  branches:
    include:
      - 

pr:
  branches:
    include:
      - 

variables:
  azureServiceConnection: 'healthcare_app_service_connection'
  azureContainerRegistry: 'healthcareacrdev73383'
  imageName: 'healthcare-app'
  imageTag: '$(Build.SourceVersion)'
  imageSemverTag: '1.0.$(Build.BuildId)'
  acrLoginServer: 'healthcareacrdev73383.azurecr.io'
  aksResourceGroupDev: 'rg-healthcare-tfplan'
  aksClusterNameDev: 'aks-healthcare-tfplan'
  aksResourceGroupProd: 'rg-healthcare-prod'
  aksClusterNameProd: 'aks-healthcare-prod'
  helmReleaseName: 'healthcare-app'
  helmChartPath: 'charts/healthcare-app'
  helmNamespaceDev: 'healthcare-dev'
  helmNamespaceProd: 'healthcare-prod'
  azAdClientId: ''
  terraformWorkingDirectory: 'terraform/azure'
  tfstateResourceGroup: 'rg-terraform'
  tfstateStorageAccount: 'tfstatehealthcare01'
  tfstateContainer: 'tfstate'
  tfstateKey: 'healthcare-azure.tfstate'
  tenantId: "a784860b-041b-42c0-a9b9-557e2e721e95"
  keyvaultName: "hc-kv-tfplan$(Build.BuildId)"
  
  # ===== NEW: SonarQube Configuration =====
  sonarQubeServiceConnection: 'Healthcare_sonarqube'
  sonarQubeProjectKey: 'healthcare-application'
  sonarQubeProjectName: 'Healthcare-Application'

stages:
  - stage: Validate
    displayName: "Validate: Lint / Test / Security"
    jobs:
      - job: Validation
        displayName: "Code validation"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"
              addToPath: true

          - script: |
              python -m pip install --upgrade pip
              pip install ruff pytest semgrep pip-audit trufflehog
              pip install -r requirements.txt
            displayName: "Install Python tooling and app dependencies"

          - script: |
              ruff check .
            displayName: "Lint Python code"

          # ===== NEW: UNIT TESTS WITH XML OUTPUT =====
          - script: |
              pytest -q --junitxml=junit/test-results.xml --cov=src --cov-report=xml --cov-report=html
            displayName: "Run unit tests (with XML report)"

          - script: |
              semgrep --config auto .
            displayName: "Run SAST with Semgrep"

          - script: |
              pip-audit --requirement requirements.txt --progress=off
            displayName: "Dependency scan with pip-audit"

          - script: |
              sudo apt-get update -y
              sudo apt-get install -y curl unzip gnupg software-properties-common
              curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
              echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
              sudo apt-get update -y
              sudo apt-get install -y terraform
              terraform version
            displayName: "Install Terraform"

          - script: |
              cd $(terraformWorkingDirectory)
              terraform fmt -check
              terraform init -backend=false
              terraform validate
            displayName: "Terraform format and validate"

          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
              tfsec --soft-fail $(Build.SourcesDirectory)/terraform
              tfsec --minimum-severity CRITICAL $(Build.SourcesDirectory)/terraform/azure
            displayName: "IaC scan with tfsec (blocks on CRITICAL)"

          - script: |
              curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sudo sh -s -- -b /usr/local/bin
              /usr/local/bin/trufflehog filesystem . --no-update --only-verified || true
            displayName: "Secret scan with TruffleHog"

          - script: |
              git fetch origin main --depth=50 || true
              git diff origin/main...HEAD > /tmp/pr.diff || git diff HEAD~1 > /tmp/pr.diff || true
              python scripts/ai_pr_review.py < /tmp/pr.diff || true
            displayName: "AI-assisted PR review (non-blocking)"
            condition: eq(variables['Build.Reason'], 'PullRequest')

          # ===== NEW: PUBLISH UNIT TEST RESULTS =====
          - task: PublishTestResults@2
            displayName: "Publish Unit Test Results"
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/junit/test-results.xml'
              testRunTitle: 'Unit Tests - Pytest'
              publishRunAttachments: true
              failTaskOnFailedTests: false

          # ===== NEW: SONARQUBE SCANNER - PREPARE ANALYSIS =====
          - task: SonarQubePrepare@7
            displayName: "SonarQube Prepare Analysis Configuration"
            inputs:
              SonarQube: '$(sonarQubeServiceConnection)'
              scannerMode: 'CLI'
              configMode: 'manual'
              cliProjectKey: '$(sonarQubeProjectKey)'
              cliProjectName: '$(sonarQubeProjectName)'
              cliSources: '.'
              extraProperties: |
                sonar.python.coverage.reportPaths=coverage.xml
                sonar.python.xunit.reportPath=junit/test-results.xml
                sonar.exclusions=**/*_test.py,**/tests/**

          # ===== NEW: SONARQUBE SCANNER - RUN ANALYSIS =====
          - task: SonarQubeAnalyze@7
            displayName: "SonarQube Run Code Analysis"

          # ===== NEW: SONARQUBE SCANNER - PUBLISH QUALITY GATE =====
          - task: SonarQubePublish@7
            displayName: "SonarQube Publish Quality Gate Result"
            inputs:
              pollingTimeoutSec: '300'

  - stage: BuildAndPush
    displayName: "Build and Push Image"
    dependsOn: Validate
    jobs:
      - job: BuildImage
        displayName: "Docker build and push"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"
              addToPath: true

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: "Install app dependencies"

          - script: |
              docker build -t $(imageName):$(imageTag) .
            displayName: "Build Docker image"

          - task: AzureCLI@2
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(azureContainerRegistry)
                docker tag $(imageName):$(imageTag) $(acrLoginServer)/$(imageName):$(imageTag)
                docker tag $(imageName):$(imageTag) $(acrLoginServer)/$(imageName):$(imageSemverTag)
                docker push $(acrLoginServer)/$(imageName):$(imageTag)
                docker push $(acrLoginServer)/$(imageName):$(imageSemverTag)
            displayName: "Push image to ACR (Git SHA + semver tags)"

          # ===== NEW: TRIVY SCAN WITH TEXT OUTPUT =====
          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/trivy-reports
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              
              echo "Running Trivy scan..."
              /usr/local/bin/trivy image --severity CRITICAL,HIGH \
                --format json \
                --output $(Build.ArtifactStagingDirectory)/trivy-reports/trivy-json-report.json \
                $(acrLoginServer)/$(imageName):$(imageTag) || true
              
              echo "Generating human-readable report..."
              /usr/local/bin/trivy image --severity CRITICAL,HIGH \
                --format table \
                --output $(Build.ArtifactStagingDirectory)/trivy-reports/trivy-text-report.txt \
                $(acrLoginServer)/$(imageName):$(imageTag) || true
              
              echo "Generating SARIF report for integration..."
              /usr/local/bin/trivy image --severity CRITICAL,HIGH \
                --format sarif \
                --output $(Build.ArtifactStagingDirectory)/trivy-reports/trivy-sarif-report.sarif \
                $(acrLoginServer)/$(imageName):$(imageTag) || true
              
              echo ""
              echo "=== TRIVY SCAN RESULTS (Text Report) ==="
              cat $(Build.ArtifactStagingDirectory)/trivy-reports/trivy-text-report.txt
              
              # Check for CRITICAL vulnerabilities and fail if found
              CRITICAL_COUNT=$(jq '[.Results[].Misconfigurations[]? | select(.Severity=="CRITICAL")] | length' $(Build.ArtifactStagingDirectory)/trivy-reports/trivy-json-report.json 2>/dev/null || echo 0)
              if [ "$CRITICAL_COUNT" -gt 0 ]; then
                echo ""
                echo "⚠️  Found $CRITICAL_COUNT CRITICAL vulnerabilities!"
                exit 1
              else
                echo ""
                echo "✅ No CRITICAL vulnerabilities found."
              fi
            displayName: "Container scan with Trivy (save reports)"

          # ===== NEW: PUBLISH TRIVY ARTIFACTS =====
          - task: PublishBuildArtifacts@1
            displayName: "Publish Trivy Reports"
            condition: always()
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)/trivy-reports'
              artifactName: 'trivy-security-reports'
              publishLocation: 'Container'

  - stage: TerraformPlan
    displayName: "Terraform Plan"
    dependsOn: BuildAndPush
    jobs:
      - job: TerraformPlan
        displayName: "Terraform plan"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"
              addToPath: true

          - script: |
              sudo apt-get update -y
              sudo apt-get install -y curl unzip gnupg software-properties-common
              curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
              echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
              sudo apt-get update -y
              sudo apt-get install -y terraform
              terraform version
            displayName: "Install Terraform"

          - task: AzureCLI@2
            displayName: "Remove Stuck Terraform State Lock (if any)"
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Checking for and removing any stuck state lock..."
                az storage blob lease break \
                  --account-name $(tfstateStorageAccount) \
                  --container-name $(tfstateContainer) \
                  --blob-name $(tfstateKey) || echo "✓ No active lease found (normal)"
                echo "Proceeding with Terraform operations..."
            continueOnError: true

          - task: AzureCLI@2
            displayName: "Debug Service Connection"
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "=== Account ==="
                az account show

                echo "=== User ==="
                az account show --query user

                echo "=== Storage Account Test ==="
                az storage account show \
                  --name $(tfstateStorageAccount) \
                  --resource-group $(tfstateResourceGroup)

          - task: AzureCLI@2
            displayName: "Terraform init and plan"
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az account show
                cd $(terraformWorkingDirectory)

                rm -rf .terraform
                rm -f .terraform.lock.hcl

                terraform init -reconfigure \
                  -backend-config="resource_group_name=$(tfstateResourceGroup)" \
                  -backend-config="storage_account_name=$(tfstateStorageAccount)" \
                  -backend-config="container_name=$(tfstateContainer)" \
                  -backend-config="key=$(tfstateKey)"
                terraform plan -out=tfplan \
                  -var="environment=dev" \
                  -var="prefix=healthcare" \
                  -var="location=centralindia" \
                  -var="backend_resource_group=$(tfstateResourceGroup)" \
                  -var="backend_storage_account=$(tfstateStorageAccount)" \
                  -var="backend_container=$(tfstateContainer)" \
                  -var="backend_key=$(tfstateKey)" \
                  -var="resource_group_name=rg-healthcare-tfplan" \
                  -var="vnet_name=healthcare-vnet" \
                  -var="vnet_cidr=10.20.0.0/16" \
                  -var="private_subnet_cidr=10.20.1.0/24" \
                  -var="public_subnet_cidr=10.20.2.0/24" \
                  -var="acr_name=$(azureContainerRegistry)" \
                  -var="acr_sku=Basic" \
                  -var="keyvault_name=$(keyvaultName)" \
                  -var="tenant_id=$(tenantId)" \
                  -var="keyvault_secret_name=database-url" \
                  -var="postgres_server_name=hc-pg-tfplan733833" \
                  -var="postgres_admin_user=pgadmin" \
                  -var="postgres_sku=B_Standard_B1ms" \
                  -var="postgres_storage_gb=32" \
                  -var="postgres_database_name=healthcare" \
                  -var="aks_cluster_name=aks-healthcare-tfplan" \
                  -var="aks_node_count=1" \
                  -var="aks_node_vm_size=Standard_DC2s_v3" \
                  -var="aks_min_count=1" \
                  -var="aks_max_count=3"

  - stage: TerraformApply
    displayName: "Terraform Apply"
    dependsOn: TerraformPlan
    condition: succeeded()

    jobs:
      - job: TerraformApply
        displayName: "Apply Infrastructure"
        pool:
          vmImage: "ubuntu-latest"

        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"
              addToPath: true

          - script: |
              sudo apt-get update -y
              sudo apt-get install -y curl unzip gnupg software-properties-common
              curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
              echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
              sudo apt-get update -y
              sudo apt-get install -y terraform
              terraform version
            displayName: "Install Terraform"

          - task: AzureCLI@2
            displayName: "Remove Stuck Terraform State Lock (if any)"
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Checking for and removing any stuck state lock..."
                az storage blob lease break \
                  --account-name $(tfstateStorageAccount) \
                  --container-name $(tfstateContainer) \
                  --blob-name $(tfstateKey) || echo "✓ No active lease found (normal)"
                echo "Proceeding with Terraform apply..."
            continueOnError: true

          - task: AzureCLI@2
            displayName: "Terraform Apply"
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd $(terraformWorkingDirectory)

                terraform init -reconfigure \
                  -backend-config="resource_group_name=$(tfstateResourceGroup)" \
                  -backend-config="storage_account_name=$(tfstateStorageAccount)" \
                  -backend-config="container_name=$(tfstateContainer)" \
                  -backend-config="key=$(tfstateKey)"

                terraform apply -auto-approve \
                  -var="environment=dev" \
                  -var="prefix=healthcare" \
                  -var="location=centralindia" \
                  -var="backend_resource_group=$(tfstateResourceGroup)" \
                  -var="backend_storage_account=$(tfstateStorageAccount)" \
                  -var="backend_container=$(tfstateContainer)" \
                  -var="backend_key=$(tfstateKey)" \
                  -var="resource_group_name=rg-healthcare-tfplan" \
                  -var="vnet_name=healthcare-vnet" \
                  -var="vnet_cidr=10.20.0.0/16" \
                  -var="private_subnet_cidr=10.20.1.0/24" \
                  -var="public_subnet_cidr=10.20.2.0/24" \
                  -var="acr_name=$(azureContainerRegistry)" \
                  -var="acr_sku=Basic" \
                  -var="keyvault_name=$(keyvaultName)" \
                  -var="tenant_id=$(tenantId)" \
                  -var="keyvault_secret_name=database-url" \
                  -var="postgres_server_name=hc-pg-tfplan733833" \
                  -var="postgres_admin_user=pgadmin" \
                  -var="postgres_sku=B_Standard_B1ms" \
                  -var="postgres_storage_gb=32" \
                  -var="postgres_database_name=healthcare" \
                  -var="aks_cluster_name=aks-healthcare-tfplan" \
                  -var="aks_node_count=1" \
                  -var="aks_node_vm_size=Standard_DC2s_v3" \
                  -var="aks_min_count=1" \
                  -var="aks_max_count=3"

  - stage: DeployDev
    displayName: "Deploy to Dev AKS"
    dependsOn: TerraformApply
    condition: succeeded()
    jobs:
      - deployment: DeployDev
        displayName: "Deploy to development AKS"
        environment: "dev-aks"
        pool:
          name: "Default"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: "Diagnose DNS & Network Issues (Dev)"
                  inputs:
                    azureSubscription: "$(azureServiceConnection)"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "========================================"
                      echo "  DNS & NETWORK DIAGNOSTICS (Dev)"
                      echo "========================================"
                      
                      echo ""
                      echo "=== 1. DNS Configuration ==="
                      cat /etc/resolv.conf
                      
                      echo ""
                      echo "=== 2. Agent Network Configuration ==="
                      echo "Hostname: $(hostname)"
                      hostname -I
                      
                      echo ""
                      echo "=== 3. Routing Table ==="
                      ip route
                      
                      echo ""
                      echo "=== 4. Network Interfaces ==="
                      ip addr show
                      
                      echo ""
                      echo "=== 5. Azure Subscription Info ==="
                      az account show --query "{Subscription: name, TenantId: tenantId}"
                      
                      echo ""
                      echo "========================================"
                  continueOnError: true

                - task: AzureCLI@2
                  displayName: "Deploy Helm chart to AKS Dev"
                  inputs:
                    azureSubscription: "$(azureServiceConnection)"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -e

                      echo "Getting AKS credentials via REST API..."
                      SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                      az rest \
                        --method post \
                        --url "https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/$(aksResourceGroupDev)/providers/Microsoft.ContainerService/managedClusters/$(aksClusterNameDev)/listClusterAdminCredential?api-version=2023-01-01" \
                        --query "kubeconfigs[0].value" \
                        -o tsv | base64 -d > /tmp/kubeconfig.yaml

                      export KUBECONFIG=/tmp/kubeconfig.yaml

                      echo "Testing Kubernetes connection..."
                      kubectl cluster-info

                      echo "Deploying Helm chart (without wait)..."
                      helm upgrade --install $(helmReleaseName) $(helmChartPath) \
                        --kubeconfig=/tmp/kubeconfig.yaml \
                        --namespace $(helmNamespaceDev) \
                        --create-namespace \
                        --set image.repository=$(acrLoginServer)/$(imageName) \
                        --set image.tag=$(imageTag) \
                        --timeout 5m

                      echo ""
                      echo "Waiting 30 seconds for pods to start..."
                      sleep 30

                      echo ""
                      echo "=== Checking Pod Status ==="
                      kubectl get pods -n $(helmNamespaceDev) -o wide

                      echo ""
                      echo "=== Pod Details ==="
                      kubectl describe pods -n $(helmNamespaceDev)

                      echo ""
                      echo "=== Pod Logs ==="
                      kubectl logs -n $(helmNamespaceDev) --all-containers=true --timestamps=true || true

                      echo ""
                      echo "=== Events ==="
                      kubectl get events -n $(helmNamespaceDev) --sort-by='.lastTimestamp'

                      echo "✅ Deployment complete! Check pod status above."

  - stage: Approval
    displayName: "Manual Approval for Prod"
    dependsOn: DeployDev
    condition: succeeded()
    jobs:
      - job: WaitForApproval
        displayName: "Wait for Production Approval"
        pool:
          server
        timeoutInMinutes: 1440
        steps:
          - task: ManualValidation@0
            displayName: "Manual Approval Required"
            inputs:
              notifyUsers: "your-team@company.com"
              instructions: "Please verify the dev deployment ($(aksClusterNameDev)) before proceeding to production. Check logs at https://portal.azure.com"

  - stage: DeployProd
    displayName: "Deploy to Prod AKS"
    dependsOn: Approval
    condition: succeeded()
    jobs:
      - deployment: DeployProd
        displayName: "Deploy to production AKS"
        environment: "prod-aks"
        pool:
          name: "Default"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: |
                    echo "=== Checking kubectl ==="
                    kubectl version --client
                    
                    echo ""
                    echo "=== Checking helm ==="
                    helm version
                    
                    echo ""
                    echo "=== Checking kubeconfig ==="
                    ls -la ~/.kube/config || echo "⚠️ No kubeconfig found"
                    
                    echo ""
                    echo "=== Verifying cluster connection ==="
                    kubectl cluster-info
                    kubectl get nodes
                  displayName: "Verify kubectl and helm setup"

                - script: |
                    set -e
                    
                    echo "=========================================="
                    echo "DEPLOYING TO PRODUCTION AKS"
                    echo "=========================================="
                    
                    echo ""
                    echo "Deploying Helm chart..."
                    helm upgrade --install $(helmReleaseName) $(helmChartPath) \
                      --namespace $(helmNamespaceProd) \
                      --create-namespace \
                      --set image.repository=$(acrLoginServer)/$(imageName) \
                      --set image.tag=$(imageTag) \
                      --values $(helmChartPath)/values-prod.yaml \
                      --wait=false \
                      --timeout 5m
                    
                    echo ""
                    echo "✅ Helm chart deployed!"
                    
                    echo ""
                    echo "Waiting 30 seconds for pods to initialize..."
                    sleep 30
                    
                    echo ""
                    echo "=== Deployment Status ==="
                    kubectl get deployment -n $(helmNamespaceProd) -o wide || echo "No deployments yet"
                    
                    echo ""
                    echo "=== Pod Status ==="
                    kubectl get pods -n $(helmNamespaceProd) -o wide || echo "No pods yet"
                    
                    echo ""
                    echo "=== Recent Events ==="
                    kubectl get events -n $(helmNamespaceProd) --sort-by='.lastTimestamp' | tail -10 || echo "No events"
                  displayName: "Deploy Helm Chart"

                - script: |
                    echo "=========================================="
                    echo "MONITORING DEPLOYMENT STATUS"
                    echo "=========================================="
                    
                    TIMEOUT=600
                    ELAPSED=0
                    
                    while [ $ELAPSED -lt $TIMEOUT ]; do
                      READY=$(kubectl get deployment $(helmReleaseName) -n $(helmNamespaceProd) -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
                      DESIRED=$(kubectl get deployment $(helmReleaseName) -n $(helmNamespaceProd) -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
                      
                      echo "[$(($ELAPSED / 60))m] Pods Ready: $READY / Desired: $DESIRED"
                      
                      if [ "$READY" = "$DESIRED" ] && [ "$DESIRED" != "0" ]; then
                        echo ""
                        echo "✅ DEPLOYMENT SUCCESSFUL!"
                        kubectl get pods -n $(helmNamespaceProd) -o wide
                        exit 0
                      fi
                      
                      sleep 15
                      ELAPSED=$((ELAPSED + 15))
                    done
                    
                    echo ""
                    echo "⚠️ Deployment monitoring timeout (still initializing)"
                    echo ""
                    echo "=== Final Status ==="
                    kubectl get pods -n $(helmNamespaceProd) -o wide
                    kubectl get events -n $(helmNamespaceProd) --sort-by='.lastTimestamp'
                  displayName: "Monitor Deployment (10 min timeout)"
                  continueOnError: true